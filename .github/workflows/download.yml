name: Download Files

on:
  push:
    branches:
      - main

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process Download Command
        id: process
        run: |
          MSG="${{ github.event.head_commit.message }}"
          
          if [[ "$MSG" == *"[skip ci]"* ]]; then
            echo "Skipping automated commit."
            exit 0
          fi

          mkdir -p downloads

          if [[ "$MSG" == *"download:"* ]]; then
            URLS=$(echo "$MSG" | grep -oP '(?<=download:\s).*')
            for URL in $URLS; do
              wget -P downloads/ "$URL" || echo "Failed"
            done
            echo "commit_needed=true" >> $GITHUB_ENV

          elif [[ "$MSG" == *"download-split:"* ]]; then
            URLS=$(echo "$MSG" | grep -oP '(?<=download-split:\s).*')
            mkdir -p temp_dl
            for URL in $URLS; do
              FILENAME=$(basename "$URL" | cut -d? -f1)
              ZIPNAME="${FILENAME%.*}.zip"
              wget -O "temp_dl/$FILENAME" "$URL" || echo "Failed"
              cd temp_dl
              zip -s 95m "../downloads/$ZIPNAME" "$FILENAME"
              cd ..
            done
            rm -rf temp_dl
            echo "commit_needed=true" >> $GITHUB_ENV
          
          elif [[ "$MSG" == *"cleanup:"* ]]; then
            rm -rf downloads/*
            touch downloads/.keep
            echo "commit_needed=true" >> $GITHUB_ENV
            
          else
            echo "commit_needed=false" >> $GITHUB_ENV
          fi

      - name: Commit and Push
        if: env.commit_needed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A downloads/
          git commit -m "chore: update files [skip ci]" || echo "No changes"
          git push
